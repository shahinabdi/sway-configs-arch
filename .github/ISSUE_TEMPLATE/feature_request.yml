name: Feature request
description: Suggest an improvement or addition to the configs
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the motivation — what's missing or awkward today?
      placeholder: e.g. There's no keybinding for toggling the waybar...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: This fits the goal of the repo (minimal, dark, fast SwayFX setup) rather than a personal one-off tweak
          required: true
        - label: I searched existing issues and this hasn't been requested yet
          required: true
